<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポモドーロタイマー</title>
    <style>
        /* 画面全体の見た目や配置を決める設定です */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            transform: scale(2); /* 全体を2倍の大きさに拡大表示します */
            transform-origin: top center; /* 拡大の基準を画面上部中央にします */
        }
        
        #statusDisplay { 
            font-size: 30px;
            color: #555; 
            margin-bottom: -30px; 
        }
        
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #timer { font-size: 100px; margin: 10px 0; }

        #totalTimeDisplay {
            font-size: 18px;
            color: #767676;
            margin-top: -20px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            width: 200px;
            background-color: #a7d398; 
            color: black;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2 id="statusDisplay">作業中</h2>

<div class="timer-container">
    <h1 id="timer">25:00</h1>
    <div id="totalTimeDisplay">本日の作業時間：0分</div>
</div>

<div class="button-container">
    <button id="startButton">開始</button>
    <button id="resetButton">リセット</button>
    <button id="endButton">終了</button>
</div>

<script>
// --- JavaScriptの処理開始 ---

let time = 5; // タイマーの残り時間を秒数で持ちます（25分＝1500秒）
let totalSeconds = 0; // 今日どれだけ作業したかの合計秒数です
let timerld = null; // タイマーが動いているか記録する場所です（nullは止まっている状態）
let isWorkMode = true; // 今が作業中(true)か休憩中(false)かの切り替えスイッチです

const startSound = new Audio("start.mp3"); // 作業開始の音ファイルを準備します
const breakSound = new Audio("break.mp3"); // 休憩開始の音ファイルを準備します
const finishSound = new Audio("finish.mp3"); // 作業終了の音ファイル

// 画面の要素を操作するために名前をつけておきます
const timerElement = document.getElementById("timer");
const statusDisplay = document.getElementById("statusDisplay");
const startButton = document.getElementById("startButton");
const resetButton = document.getElementById("resetButton");
const endButton = document.getElementById("endButton");
    
// タイマーの数字や表示を最新にするための関数です
function updateDisplay() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    timerElement.textContent =
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");

    let hours = Math.floor(totalSeconds / 3600);
    let remainingMinutes = Math.floor((totalSeconds % 3600) / 60);
    const displayElement = document.getElementById("totalTimeDisplay");

    if (hours > 0) {
        displayElement.textContent = "本日の作業時間：" + hours + "時間" + remainingMinutes + "分";
    } else {
        displayElement.textContent = "本日の作業時間：" + remainingMinutes + "分";
    }

    statusDisplay.textContent = isWorkMode ? "作業中" : "休憩中";
}

// 作業と休憩を入れ替える関数です
function switchMode() {
    isWorkMode = !isWorkMode;
    time = isWorkMode ? 25 * 60 : 5 * 60;

    // ★ここが修正ポイント（モードに応じて必ず鳴らす）
    if (isWorkMode) {
        startSound.currentTime = 0;
        startSound.play().catch(() => {});
    } else {
        breakSound.currentTime = 0;
        breakSound.play().catch(() => {});
    }

    updateDisplay();
}

// 開始ボタンが押された時の処理です
startButton.addEventListener("click", function() {
    if (timerld === null) {

        // ★手動開始だけ音を鳴らす
        startSound.currentTime = 0;
        startSound.play().catch(() => {});

        timerld = setInterval(function() {
            time--;

            if (isWorkMode) {
                totalSeconds++;
            }

            updateDisplay();

            if (time <= 0) {
                clearInterval(timerld);
                timerld = null;

                switchMode();

                // ★自動再開（音はswitchModeで鳴るのでここでは鳴らさない）
                startButton.click();
            }
        }, 1000);

        startButton.textContent = "停止";
    } else {
        clearInterval(timerld);
        timerld = null;

        startSound.pause();
        startSound.currentTime = 0;

        breakSound.pause();
        breakSound.currentTime = 0;

        startButton.textContent = "開始";
    }
});

// リセットボタンが押された時の処理です
resetButton.addEventListener("click", function() {
    clearInterval(timerld);
    timerld = null;
    isWorkMode = true;
    time = 25 * 60;
    totalSeconds = 0;

    startSound.pause();
    startSound.currentTime = 0;
    breakSound.pause();
    breakSound.currentTime = 0;

    updateDisplay();
    startButton.textContent = "開始";
});

// 終了ボタン（結果確認）が押された時の処理です
endButton.addEventListener("click", function() {
    finishSound.play().catch(() => {});

    let hours = Math.floor(totalSeconds / 3600);
    let minutes = Math.floor((totalSeconds % 3600) / 60);

    setTimeout(function() {
        alert("お疲れ様でした！本日の合計作業時間： " + hours + "時間" + minutes + "分 ");
    }, 100);
});
</script>

</body>
</html>
