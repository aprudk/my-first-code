<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポモドーロタイマー</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; transform: scale(2); transform-origin: top center; }
        #statusDisplay { font-size: 30px; color: #555; margin-bottom: -30px; }
        .timer-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        #timer { font-size: 100px; margin: 10px 0; }
        #totalTimeDisplay { font-size: 18px; color: #767676; margin-top: -20px; }
        .button-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; width: 200px; background-color: #a7d398; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<h2 id="statusDisplay">作業中</h2>
<div class="timer-container">
    <h1 id="timer">00:05</h1>
    <div id="totalTimeDisplay">本日の作業時間：0分</div>
</div>
<div class="button-container">
    <button id="startButton">開始</button>
    <button id="resetButton">リセット</button>
    <button id="endButton">終了</button>
</div>

<script>
let time = 5; 
let totalSeconds = 0;
let timerld = null;
let isWorkMode = true;

const startSound = new Audio("start.mp3");
const breakSound = new Audio("break.mp3");
const timerElement = document.getElementById("timer");
const statusDisplay = document.getElementById("statusDisplay");
const startButton = document.getElementById("startButton");

function updateDisplay() {
    timerElement.textContent = String(Math.floor(time / 60)).padStart(2, "0") + ":" + String(time % 60).padStart(2, "0");
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    document.getElementById("totalTimeDisplay").textContent = h > 0 ? `本日の作業時間：${h}時間${m}分` : `本日の作業時間：${m}分`;
    statusDisplay.textContent = isWorkMode ? "作業中" : "休憩中";
}

function switchMode() {
    isWorkMode = !isWorkMode;
    time = isWorkMode ? 25 * 60 : 5;
    if (isWorkMode) { startSound.play(); } else { breakSound.play(); }
    updateDisplay();
}

startButton.addEventListener("click", function() {
    if (timerld === null) {
        // タイマー開始時のみ音を鳴らす
        startSound.currentTime = 0;
        startSound.play().catch(() => {});
        
        timerld = setInterval(function() {
            time--;
            if (isWorkMode) totalSeconds++;
            updateDisplay();
            if (time <= 0) {
                clearInterval(timerld);
                timerld = null;
                switchMode();
                startButton.click();
            }
        }, 1000);
        startButton.textContent = "停止";
    } else {
        // 停止時：タイマーを止めて音も止める
        clearInterval(timerld);
        timerld = null;
        startSound.pause();
        startSound.currentTime = 0;
        breakSound.pause();
        breakSound.currentTime = 0;
        startButton.textContent = "開始";
    }
});

document.getElementById("resetButton").addEventListener("click", function() {
    clearInterval(timerld);
    timerld = null;
    isWorkMode = true;
    time = 5;
    totalSeconds = 0;
    startSound.pause();
    breakSound.pause();
    updateDisplay();
    startButton.textContent = "開始";
});
</script>
</body>
</html>
