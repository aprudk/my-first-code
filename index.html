<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポモドーロ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; font-size: 24px; }
        #timer { font-size: 80px; margin: 20px; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<h2 id="status">作業中</h2>
<div id="timer">00:05</div>
<button id="actionBtn">開始</button>

<script>
    let time = 5;
    let isWork = true;
    let timerId = null;
    const startSnd = new Audio("start.mp3");
    const breakSnd = new Audio("break.mp3");

    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("actionBtn");

    function update() {
        timerEl.textContent = "00:" + String(time).padStart(2, "0");
        statusEl.textContent = isWork ? "作業中" : "休憩中";
    }

    btn.addEventListener("click", () => {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            btn.textContent = "開始";
            return;
        }

        // 次へ進むフェーズ（タイマーが終了していたら）
        if (time <= 0) {
            isWork = !isWork;
            time = isWork ? 5 : 5; // ここを25分などに戻してください
            update();
        }

        // タイマー開始
        btn.textContent = "一時停止";
        timerId = setInterval(() => {
            time--;
            update();
            if (time <= 0) {
                clearInterval(timerId);
                timerId = null;
                // 終了した瞬間、必ず音が鳴る状態を作る
                isWork ? breakSnd.play() : startSnd.play();
                btn.textContent = isWork ? "休憩へ" : "作業へ";
            }
        }, 1000);
    });

    update();
</script>
</body>
</html>
