<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポモドーロタイマー</title>
    <style>
        /* 画面全体の見た目や配置を決める設定です */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            transform: scale(2); /* 全体を2倍の大きさに拡大表示します */
            transform-origin: top center; /* 拡大の基準を画面上部中央にします */
        }
        
        #statusDisplay { 
            font-size: 30px;
            color: #555; 
            margin-bottom: -30px; 
        }
        
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #timer { font-size: 100px; margin: 10px 0; }

        #totalTimeDisplay {
            font-size: 18px;
            color: #767676;
            margin-top: -20px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            width: 200px;
            background-color: #a7d398; 
            color: black;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2 id="statusDisplay">作業中</h2>

<div class="timer-container">
    <h1 id="timer">25:00</h1>
    <div id="totalTimeDisplay">本日の作業時間：0分</div>
</div>

<div class="button-container">
    <button id="startButton">開始</button>
    <button id="resetButton">リセット</button>
    <button id="endButton">終了</button>
</div>

<script>
// --- JavaScriptの処理開始 ---

let time = 0; // タイマーの残り時間を秒数で持ちます（25分＝1500秒）
let totalSeconds = 0; // 今日どれだけ作業したかの合計秒数です
let timerld = null; // タイマーが動いているか記録する場所です（nullは止まっている状態）
let isWorkMode = true; // 今が作業中(true)か休憩中(false)かの切り替えスイッチです

const startSound = new Audio("start.mp3"); // 作業開始の音ファイルを準備します
const breakSound = new Audio("break.mp3"); // 休憩開始の音ファイルを準備します
const finishSound = new Audio("finish.mp3"); // 作業終了の音ファイル

// --- 【追加】iPhoneの権限確保用関数 ---
function unlockAudio() {
    breakSound.volume = 0; // 一時的に無音で再生
    breakSound.play().then(() => {
        breakSound.pause();
        breakSound.currentTime = 0;
        breakSound.volume = 1; // 音量を戻す
    }).catch(() => {});
}

// 画面の要素を操作するために名前をつけておきます
// ドキュメント=Webページ
// ゲット・エレメント・バイ・アイディー=指定した要素（ID)を拾い上げて操作できる状態にする
const timerElement = document.getElementById("timer");
const statusDisplay = document.getElementById("statusDisplay");
const startButton = document.getElementById("startButton");
const resetButton = document.getElementById("resetButton");
const endButton = document.getElementById("endButton");
    
// タイマーの数字や表示を最新にするための関数です
// function=料理レシピのようなもの、命令のパッケージ
// undateDisplay=見えない計算を、見えるように画面に反映する
function updateDisplay() {
    let minutes = Math.floor(time / 60); // 秒数から「分」を計算します
    let seconds = time % 60; // 秒数から「余りの秒」を計算します
    // 「05:00」のように2桁で表示するように文字を整えます
    timerElement.textContent = String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    // textContent=String（後述）を書くための掲示板のようなもの
    // String=文字列（人間が読む文字）

    let hours = Math.floor(totalSeconds / 3600); // 合計秒から「時間」を計算
    let remainingMinutes = Math.floor((totalSeconds % 3600) / 60); // 合計秒から「残り分」を計算
    const displayElement = document.getElementById("totalTimeDisplay");

    // 合計作業時間の表示文言を作ります
    if (hours > 0) {
        displayElement.textContent = "本日の作業時間：" + hours + "時間" + remainingMinutes + "分";
    } else {
        displayElement.textContent = "本日の作業時間：" + remainingMinutes + "分";
    }

    // 今が作業中か休憩中かを表示します
    statusDisplay.textContent = isWorkMode ? "作業中" : "休憩中";
}

// 作業と休憩を入れ替える関数です
function switchMode() {
    isWorkMode = !isWorkMode; // スイッチを反転させます
    time = isWorkMode ? 25 * 60 : 5 * 60; // モードに合わせて時間をセットします
    
    // 音を鳴らします。失敗してもプログラムが止まらないよう .catch(() => {}) をつけます
    if (isWorkMode) { startSound.play().catch(() => {}); } else { breakSound.play().catch(() => {}); }
    // () => {}は「何もしない」という空っぽの命令。エラーが起きても無視してという意味になる

    updateDisplay(); // 画面を更新します
}

// 開始ボタンが押された時の処理です
startButton.addEventListener("click", function() {
    if (timerld === null) {
        // 【追加】ここでiPhoneの権限を先回りして確保
        unlockAudio();

        // タイマーが止まっていたらスタートします
        startSound.currentTime = 0; // 音を最初から再生できるようにリセット
        startSound.play().catch(() => {}); // 再生開始
        
        // 1秒ごとに動き出すタイマーです
        timerld = setInterval(function() {
            time--; // 1秒減らします
            
            if (isWorkMode) {
                totalSeconds++; // 作業中なら合計時間を増やします
            }
            
            updateDisplay(); // 画面を書き換えます

            // 時間が0になったらタイマーを止めて切り替えます
            if (time <= 0) {
                clearInterval(timerld);
                timerld = null;
                switchMode(); // モード切り替え
                startButton.click(); // 自動的に次のタイマーを回します
            }
        }, 1000);

        startButton.textContent = "停止"; // ボタンの名前を「停止」にします
    } else {
        // タイマーが動いている時に押したら止める処理です
        clearInterval(timerld); // タイマーを解除
        timerld = null; // 止まっている状態に設定
        startSound.pause(); // 音を一時停止
        startSound.currentTime = 0; // 音を最初に戻す
        breakSound.pause(); // 休憩の音も停止
        breakSound.currentTime = 0;
        startButton.textContent = "開始"; // ボタンを「開始」に戻す
    }
});

// リセットボタンが押された時の処理です
resetButton.addEventListener("click", function() {
    clearInterval(timerld); // タイマーを停止
    timerld = null;
    isWorkMode = true; // 作業モードに戻す
    time = 25 * 60; // 時間を25分に戻す
    totalSeconds = 0; // 合計時間をゼロに
    startSound.pause(); // 音を停止
    startSound.currentTime = 0;
    breakSound.pause();
    breakSound.currentTime = 0;
    updateDisplay(); // 画面をリセット
    startButton.textContent = "開始";
});

// 終了ボタン（結果確認）が押された時の処理です
endButton.addEventListener("click", function() {
    // １、音を鳴らす
    finishSound.play().catch(() => {});

    // ２、処理計算
    let hours = Math.floor(totalSeconds / 3600); // 合計時間を計算
    let minutes = Math.floor((totalSeconds % 3600) / 60); // 合計分を計算

    // ３、ポップアップ表示（少しだけ時間をずらして実行する）
    setTimeout(function() {
        alert("お疲れ様でした！本日の合計作業時間： " + hours + "時間" + minutes + "分 ");
    }, 100); // 0.1秒待つことで、ブラウザが音声再生を先に処理できるようにします
});
</script>

</body>
</html>
